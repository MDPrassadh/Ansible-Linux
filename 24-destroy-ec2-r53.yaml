- name: destroy ec2 and r53
  hosts: localhost
  connection: local

  vars:
    subnet_id: subnet-0648e016f60665d39
    sg_id: sg-02a5e0c53ec4cd644
    ami_id: ami-0ad50334604831820
    region: us-east-1
    zone: jioairlines.online

    instances:
      - mysql
      - backend
      - frontend

  tasks:

    - name: delete private r53 records
      amazon.aws.route53:
        state: absent
        zone: "{{ zone }}"
        record: "{{ item }}.{{ zone }}"
        type: A
      loop: "{{ instances }}"


    - name: delete public r53 record for frontend
      amazon.aws.route53:
        state: absent
        zone: "{{ zone }}"
        record: "{{ zone }}"
        type: A


    - name: terminate ec2 instances
      amazon.aws.ec2_instance:
        name: "{{ item }}"
        region: "{{ region }}"
        state: absent
      loop: "{{ instances }}"